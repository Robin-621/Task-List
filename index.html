<style>

  .date-sub { font-size: 13px; color: var(--ink-soft); margin-bottom: 12px; }

  .busy-tag.show { display: block; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--burgundy); margin: 18px 2px 7px; }

  .phase-tag { display: inline-flex; align-items: center; gap: 7px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--accent-contrast); background: var(--before); padding: 5px 12px; border-radius: 100px; margin: 18px 0 8px; cursor: pointer; }
  .phase-tag.while { background: var(--while); }
  .phase-tag.after { background: var(--after); color: var(--after-ink); }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 15px; overflow: hidden; margin-bottom: 10px; }
  .cat-head { padding: 9px 12px; font-family: 'Merienda', cursive; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); color: var(--accent-contrast); }

  .cat-chevs { display: flex; flex-direction: column; gap: 1px; }
  .cat-chev { font-size: 9px; line-height: 0.8; cursor: pointer; opacity: 0.7; padding: 0 2px; }
  .cat-chev:active { opacity: 1; }
  .cat-head-right { display: flex; align-items: center; gap: 10px; }
  .cat-fold { font-size: 12px; cursor: pointer; opacity: 0.85; padding: 0 2px; }
  .cat-head.before { background: var(--head-before); }
  .cat-head.while { background: var(--head-while); }
  .cat-head.after { background: var(--head-after); color: var(--head-after-ink); }
  .cat-count { font-size: 11px; font-weight: 500; opacity: 0.85; }
  .row { display: flex; align-items: flex-start; gap: 8px; padding: 12px 12px; border-bottom: 1px solid var(--line); position: relative; }
  .row:last-of-type { border-bottom: none; }
  .row.sub { padding-left: 38px; padding-top: 9px; padding-bottom: 9px; }

  .arrow-btn:active { opacity: 1; color: var(--burgundy); }
  .box { width: 19px; height: 19px; border-radius: 6px; border: 2px solid #C4B9C1; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
  .box.sm { width: 17px; height: 17px; border-radius: 5px; }

  .row.done-row { padding-top: 7px; padding-bottom: 7px; }
  .box svg { width: 11px; height: 11px; opacity: 0; }

  .txt { flex: 1; font-size: 15px; line-height: 1.35; cursor: text; word-break: break-word; padding-top: 1px; }

  .star { flex-shrink: 0; font-size: 16px; color: #D4C8D0; cursor: pointer; line-height: 1; padding: 2px 3px 6px 3px; margin-top: 1px; }
  .star.on { color: var(--burgundy); }
  .tmrw-btn { flex-shrink: 0; font-size: 15px; color: var(--ink-soft); cursor: pointer; line-height: 1; padding: 2px 3px 6px 3px; opacity: 0.7; margin-top: 1px; }

  .add-line { padding: 9px 12px; }

  .tab .ic { font-size: 19px; display: block; margin-bottom: 2px; line-height: 1; }
  .tab.active { color: var(--burgundy); font-weight: 600; }
  .view { display: none; }
  .view.show { display: block; }

  .modal-actions button { flex: 1; padding: 11px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--burgundy); color: var(--accent-contrast); }
  .btn-ghost { background: var(--surface-2); color: var(--ink); }

/* Storage: browser localStorage so it works standalone in Safari, with a
   fallback to Claude's window.storage inside the Claude viewer. */
const store = (function(){
  let ls = null;
  try { const k='__t'; window.localStorage.setItem(k,'1'); window.localStorage.removeItem(k); ls = window.localStorage; } catch(e){ ls = null; }
  if (ls) return {
    get: async (key) => { const v = ls.getItem(key); return v===null ? null : { key, value:v }; },
    set: async (key, value) => { ls.setItem(key, value); return { key, value }; }
  };
  return {
    get: async (key) => { try { return await window.storage.get(key, false); } catch(e){ return null; } },
    set: async (key, value) => { try { return await window.storage.set(key, value, false); } catch(e){ return null; } }
  };
})();

const KEY = 'robins-tasklist-v5';
const COLLAPSE_KEY = 'robins-tasklist-collapse';
const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const CAT_ORDER = ['Move','Trip Home','Documentation','Health','School + Career','Miscellaneous'];
const PHASES = [['before','Before Trip',''],['while','While There','while'],['after','After Trip','after']];

let data = null;
let collapsed = {};
let saveT = null;
let openMenuId = null;

function uid(){ return Math.random().toString(36).slice(2,10); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function shortDate(iso){ const d = new Date(iso); return (d.getMonth()+1)+'/'+d.getDate(); }
function mk(text, phase, category, extra){ return Object.assign({ id: uid(), text, done:false, doneDate:null, starState:'none', starredDate:null, maybe:false, phase, category, subitems:[] }, extra||{}); }

function seed(){ return JSON.parse(JSON.stringify(SEED)); }

async function load(){
  try { const r = await store.get(KEY); data = r && r.value ? JSON.parse(r.value) : seed(); }
  catch(e){ data = seed(); }
  if (data.lastReset !== todayStr()){
    data.recurring.forEach(x => x.done = false);
    allTasks().forEach(item => { if (item.starState === 'tomorrow'){ item.starState = 'today'; item.starredDate = todayStr(); } });
    data.lastReset = todayStr();
    save();
  }
  try { const c = await store.get(COLLAPSE_KEY); collapsed = c && c.value ? JSON.parse(c.value) : {}; } catch(e){ collapsed = {}; }
  renderAll();
}

function save(){
  clearTimeout(saveT);
  saveT = setTimeout(async () => { try { await store.set(KEY, JSON.stringify(data)); } catch(e){} }, 150);
}
async function saveCollapse(){ try { await store.set(COLLAPSE_KEY, JSON.stringify(collapsed)); } catch(e){} }

function allTasks(){ return data.overall.concat(data.social); }
function el(tag, cls, html){ const e=document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function sortForDisplay(arr){ return arr.slice().sort((a,b) => (a.done?1:0)-(b.done?1:0)); }

function setStar(item, state){ item.starState = state; item.starredDate = state==='today' ? todayStr() : null; save(); renderAll(); }
function toggleStarToday(item){ setStar(item, item.starState==='today' ? 'none' : 'today'); }
function sendTomorrow(item){ setStar(item, 'tomorrow'); }
function toggleDone(item){ item.done = !item.done; if (item.done){ item.doneDate = todayStr(); item.maybe = false; } else { item.doneDate = null; } save(); renderAll(); }
function toggleMaybe(item){ item.maybe = !item.maybe; save(); renderAll(); }
function toggleSub(s){ s.done = !s.done; save(); renderAll(); }
function delTask(list, item){ const i=list.indexOf(item); if(i>-1) list.splice(i,1); save(); renderAll(); }

function findOwnerList(id){ if (data.overall.some(t => t.id===id)) return data.overall; if (data.social.some(t => t.id===id)) return data.social; return null; }
function findParentOf(id){ return allTasks().find(t => t.subitems.some(s => s.id===id)) || null; }
function nestTask(item){
  const list = findOwnerList(item.id); if (!list) return;
  const sib = list.filter(t => t.phase===item.phase && t.category===item.category);
  const pos = sib.indexOf(item); if (pos <= 0) return;
  const parent = sib[pos-1]; const idx = list.indexOf(item); list.splice(idx, 1);
  parent.subitems.push({ id:item.id, text:item.text, done:item.done });
  save(); renderAll();
}
function unnestSub(subItem){
  const parent = findParentOf(subItem.id); if (!parent) return;
  const list = findOwnerList(parent.id); if (!list) return;
  const si = parent.subitems.findIndex(s => s.id===subItem.id); if (si>-1) parent.subitems.splice(si, 1);
  const promoted = mk(subItem.text, parent.phase, parent.category, { done:subItem.done, doneDate: subItem.done?todayStr():null });
  promoted.id = subItem.id; const pIdx = list.indexOf(parent); list.splice(pIdx+1, 0, promoted);
  save(); renderAll();
}
function moveTask(item, dir){
  const list = findOwnerList(item.id); if (!list) return;
  const sib = list.filter(t => t.phase===item.phase && t.category===item.category && !t.done);
  const pos = sib.indexOf(item); const swapWith = sib[pos+dir]; if (!swapWith) return;
  const iA = list.indexOf(item), iB = list.indexOf(swapWith);
  list[iA] = swapWith; list[iB] = item; save(); renderAll();
}
function moveSub(parent, subItem, dir){
  const arr = parent.subitems; const pos = arr.indexOf(subItem); const t = pos+dir;
  if (t<0 || t>=arr.length) return;
  arr[pos] = arr[t]; arr[t] = subItem; save(); renderAll();
}

/* Per-phase category ordering. data.catOrder[phase] = [cat names...] */
function catOrderFor(pk){
  if (!data.catOrder) data.catOrder = {};
  if (!data.catOrder[pk]) data.catOrder[pk] = CAT_ORDER.slice();
  // make sure any new category is included
  CAT_ORDER.forEach(c => { if (data.catOrder[pk].indexOf(c)===-1) data.catOrder[pk].push(c); });
  return data.catOrder[pk];
}
function moveCat(pk, cat, dir, presentCats){
  const order = catOrderFor(pk).filter(c => presentCats.indexOf(c)!==-1);
  const pos = order.indexOf(cat); const t = pos+dir;
  if (t<0 || t>=order.length) return;
  const swap = order[t];
  const full = catOrderFor(pk);
  const iA = full.indexOf(cat), iB = full.indexOf(swap);
  full[iA] = swap; full[iB] = cat;
  save(); renderAll();
}
function toggleCatCollapse(pk, cat){
  const key = 'cat-'+pk+'-'+cat;
  collapsed[key] = !collapsed[key];
  saveCollapse(); renderAll();
}

/* Today's Picks ordering: fresh first, then pending, but honor manual todayOrder within */
function orderedPicks(todays){
  if (!data.todayOrder) data.todayOrder = [];
  const rank = id => { const i = data.todayOrder.indexOf(id); return i===-1 ? 9999 : i; };
  const fresh = todays.filter(t => t.starredDate===todayStr()).sort((a,b)=>rank(a.id)-rank(b.id));
  const pending = todays.filter(t => t.starredDate!==todayStr()).sort((a,b)=>rank(a.id)-rank(b.id));
  return fresh.concat(pending);
}
function movePick(todays, index, dir){
  const ordered = orderedPicks(todays);
  const t = index+dir; if (t<0 || t>=ordered.length) return;
  const a = ordered[index], b = ordered[t];
  const isFresh = x => x.starredDate===todayStr();
  if (isFresh(a) !== isFresh(b)) return;
  const ids = ordered.map(x=>x.id);
  ids[index] = b.id; ids[t] = a.id;
  data.todayOrder = ids;
  save(); renderAll();
}

function startEdit(txtEl, item){
  const input = el('input','edit-input'); input.value = item.text; txtEl.replaceWith(input);
  input.focus(); input.setSelectionRange(input.value.length, input.value.length);
  const commit = () => { item.text = input.value.trim() || item.text; save(); renderAll(); };
  input.addEventListener('blur', () => setTimeout(commit, 120));
  input.addEventListener('keydown', e => { if(e.key==='Enter') input.blur(); });
}

function closeMenu(){ openMenuId = null; document.querySelectorAll('.menu').forEach(m=>m.remove()); }

function buildMenu(item, opts){
  const menu = el('div','menu');
  const mi = (ico, label, cls, fn) => {
    const it = el('div','menu-item'+(cls?' '+cls:''), '<span class="mi-ico">'+ico+'</span>'+label);
    it.addEventListener('click', (e)=>{ e.stopPropagation(); closeMenu(); fn(); });
    return it;
  };
  const maybeLabel = item.maybe ? 'Clear maybe' : 'Make maybe';
  menu.appendChild(mi('\u25A1', maybeLabel, '', ()=>toggleMaybe(item)));
  if (opts.isSub){
    menu.appendChild(mi('\u2934', 'Un-nest', '', ()=>unnestSub(item)));
    const reo = el('div','menu-reorder');
    const up = el('span',null,'\u2303'); up.addEventListener('click',(e)=>{ e.stopPropagation(); moveSub(opts.parent, item, -1); });
    const dn = el('span',null,'\u2304'); dn.addEventListener('click',(e)=>{ e.stopPropagation(); moveSub(opts.parent, item, 1); });
    reo.appendChild(up); reo.appendChild(dn); menu.appendChild(reo);
  } else {
    menu.appendChild(mi('\u2937', 'Make sub-task', '', ()=>nestTask(item)));
  }
  menu.appendChild(mi('\u2715', 'Delete', 'danger', ()=>{
    if (opts.isSub){ const p = findParentOf(item.id); if(p){ const i=p.subitems.indexOf(item); if(i>-1)p.subitems.splice(i,1); save(); renderAll(); } }
    else { const list = findOwnerList(item.id); if(list) delTask(list, item); }
  }));
  return menu;
}

function makeRow(item, opts){
  opts = opts || {};
  const row = el('div','row'+(opts.isSub?' sub':'')+(opts.pending?' pending':'')+(item.done?' done-row':''));
  row.dataset.id = item.id;
  if (opts.reorder){
    const arrows = el('div','arrows');
    const up = el('div','arrow-btn','\u2303'); up.addEventListener('click', ()=>moveTask(item,-1));
    const dn = el('div','arrow-btn','\u2304'); dn.addEventListener('click', ()=>moveTask(item,1));
    arrows.appendChild(up); arrows.appendChild(dn); row.appendChild(arrows);
  }
  if (opts.pickReorder){
    const pr = opts.pickReorder;
    const arrows = el('div','arrows');
    const up = el('div','arrow-btn','\u2303'); up.addEventListener('click', ()=>movePick(allTasks().filter(t=>t.starState==='today'), pr.index, -1));
    const dn = el('div','arrow-btn','\u2304'); dn.addEventListener('click', ()=>movePick(allTasks().filter(t=>t.starState==='today'), pr.index, 1));
    arrows.appendChild(up); arrows.appendChild(dn); row.appendChild(arrows);
  }
  const box = el('div','box'+(opts.isSub?' sm':'')+(item.done?' done':'')+(!item.done && item.maybe ? ' maybe':''), CHECK);
  box.addEventListener('click', ()=>toggleDone(item));
  row.appendChild(box);
  const txt = el('div','txt'+(item.done?' done':'')+(!item.done && item.maybe?' maybe':''), escapeHtml(item.text));
  txt.addEventListener('click', () => startEdit(txt, item));
  row.appendChild(txt);
  if (item.done && item.doneDate) row.appendChild(el('div','done-date', shortDate(item.doneDate)));
  if (opts.showStar){
    const star = el('div','star'+(item.starState==='today'?' on':''), item.starState==='today'?'\u2605':'\u2606');
    star.addEventListener('click', () => toggleStarToday(item)); row.appendChild(star);
  }
  if (opts.showTomorrow){
    const tb = el('div','tmrw-btn','\u2192'); tb.addEventListener('click', () => sendTomorrow(item)); row.appendChild(tb);
  }
  if (opts.showMenu){
    const dots = el('div','dots','\u22EE');
    dots.addEventListener('click', (e)=>{
      e.stopPropagation();
      if (openMenuId === item.id){ closeMenu(); return; }
      closeMenu(); openMenuId = item.id;
      const menu = buildMenu(item, opts); row.appendChild(menu);
    });
    row.appendChild(dots);
  }
  if (opts.recDelete){
    const del = el('div','dots','\u00d7');
    del.addEventListener('click', ()=>{ const i=data.recurring.indexOf(item); if(i>-1) data.recurring.splice(i,1); save(); renderAll(); });
    row.appendChild(del);
  }
  return row;
}

function makeAddRow(placeholder, onAdd){
  const wrap = el('div','add-line');
  const toggle = el('div','add-toggle','+ Add');
  const inline = el('div','add-inline');
  const input = el('input'); input.placeholder = placeholder;
  const btn = el('button', null, '\u2192');
  inline.appendChild(input); inline.appendChild(btn); wrap.appendChild(toggle); wrap.appendChild(inline);
  toggle.addEventListener('click', () => { inline.classList.add('show'); toggle.style.display='none'; input.focus(); });
  const go = () => { const v=input.value.trim(); if(v){ onAdd(v); input.value=''; inline.classList.remove('show'); toggle.style.display='block'; } };
  btn.addEventListener('click', go);
  input.addEventListener('keydown', e => { if(e.key==='Enter') go(); });
  return wrap;
}

/* ---------- TODAY (Picks, then Tomorrow, then Recurring) ---------- */
function renderToday(){
  const v = document.getElementById('view-today'); v.innerHTML = '';
  const d = new Date();
  const dl = d.getDate() + ' ' + d.toLocaleDateString('en-US',{month:'long'}) + ', ' + d.toLocaleDateString('en-US',{weekday:'short'});
  v.appendChild(el('div','date-line', dl));

  const todays = allTasks().filter(t => t.starState==='today');
  const recDone = data.recurring.filter(r=>r.done).length;
  const totalToday = todays.length + data.recurring.length;
  const doneToday = todays.filter(t=>t.done).length + recDone;
  const pct = totalToday===0 ? 0 : Math.round((doneToday/totalToday)*100);
  const pw = el('div','progress-wrap');
  pw.innerHTML = '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="progress-label">'+(totalToday===0?'Nothing on today yet':doneToday+' of '+totalToday+' done')+'</div>';
  v.appendChild(pw);

  const activePicks = todays.filter(t=>!t.done);
  v.appendChild(el('div','busy-tag'+(activePicks.length>6?' show':''), 'Busy day! Let\u2019s focus your top tasks.'));

  v.appendChild(el('div','section-label first','Today\u2019s Picks'));
  const pc = el('div','card');
  if (todays.length===0){ pc.appendChild(el('div','empty','Nothing picked yet. Star a task in Overall or Social.')); }
  else {
    if (!data.todayOrder) data.todayOrder = [];
    const ordered = orderedPicks(todays);
    ordered.forEach((item, i) => {
      pc.appendChild(makeRow(item, { showStar:true, showTomorrow:true,
        pending: item.starredDate!==todayStr(),
        pickReorder: { count: ordered.length, index: i } }));
      item.subitems.forEach(s => pc.appendChild(makeRow(s, {isSub:true, parent:item})));
    });
  }
  v.appendChild(pc);

  v.appendChild(el('div','section-label','Recurring'));
  const rc = el('div','card');
  sortForDisplay(data.recurring).forEach(item => rc.appendChild(makeRow(item, { showMenu:false, recDelete:true })));
  rc.appendChild(makeAddRow('Add a daily habit...', (val)=>{ data.recurring.push({id:uid(), text:val, done:false}); save(); renderAll(); }));
  v.appendChild(rc);

  const tmrw = allTasks().filter(t => t.starState==='tomorrow');
  const td = new Date(); td.setDate(td.getDate()+1);
  const ord = (n)=>{ const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
  const tmrwLabel = 'Tomorrow  \u00b7  ' + ord(td.getDate()) + ' ' + td.toLocaleDateString('en-US',{month:'short'});
  v.appendChild(el('div','section-label', tmrwLabel));
  const tc = el('div','card');
  if (tmrw.length===0){ tc.appendChild(el('div','empty','Nothing queued for tomorrow yet. Tap \u2192 on a pick to send it here.')); }
  else {
    tmrw.forEach(item => {
      tc.appendChild(makeRow(item, { showStar:true }));
      item.subitems.forEach(s => {
        const sr = el('div','row sub');
        sr.appendChild(el('div','box sm'+(s.done?' done':''), CHECK));
        sr.appendChild(el('div','txt'+(s.done?' done':''), escapeHtml(s.text)));
        sr.querySelector('.box').style.pointerEvents = 'none';
        sr.querySelector('.txt').style.cursor = 'default';
        tc.appendChild(sr);
      });
    });
  }
  v.appendChild(tc);

  const links = el('div','data-links');
  const exp = el('span','link','Export data'); exp.addEventListener('click', ()=>openModal('export'));
  const imp = el('span','link','Import data'); imp.addEventListener('click', ()=>openModal('import'));
  links.appendChild(exp); links.appendChild(el('span','sep','|')); links.appendChild(imp);
  v.appendChild(links);
}

function phaseHeader(pk, label, cls){
  const key = 'phase-'+pk;
  const isCol = !!collapsed[key];
  const tag = el('span','phase-tag '+cls+(isCol?' collapsed':''), '<span class="caret">\u25BC</span>'+label);
  tag.addEventListener('click', ()=>{ collapsed[key] = !collapsed[key]; saveCollapse(); renderAll(); });
  return { tag, isCol };
}

/* ---------- OVERALL ---------- */
function renderOverall(){
  const v = document.getElementById('view-overall'); v.innerHTML = '';
  v.appendChild(el('div','date-line','All Tasks'));
  PHASES.forEach(([pk,label,cls]) => {
    const inPhase = data.overall.filter(t => t.phase===pk);
    if (inPhase.length===0) return;
    const { tag, isCol } = phaseHeader(pk, label, cls);
    v.appendChild(tag);
    if (isCol) return;
    const presentCats = CAT_ORDER.filter(cat => inPhase.some(t => t.category===cat));
    const orderedCats = catOrderFor(pk).filter(cat => presentCats.indexOf(cat)!==-1);
    orderedCats.forEach((cat, ci) => {
      const items = inPhase.filter(t => t.category===cat);
      if (items.length===0) return;
      const card = el('div','card'); card.dataset.phase = pk; card.dataset.category = cat;
      const doneN = items.filter(t=>t.done).length;
      const bigEnough = items.length > 9;
      const collKey = 'cat-'+pk+'-'+cat;
      const isCatCol = bigEnough && !!collapsed[collKey];
      // auto-expand if it dropped to <=9 while collapsed
      if (!bigEnough && collapsed[collKey]) { collapsed[collKey] = false; }

      const head = el('div','cat-head '+(cls||'before'));
      const left = el('div','cat-head-left');
      const catChevs = el('span','cat-chevs');
      const cu = el('span','cat-chev','\u2303'); cu.addEventListener('click',(e)=>{ e.stopPropagation(); moveCat(pk, cat, -1, presentCats); });
      const cd = el('span','cat-chev','\u2304'); cd.addEventListener('click',(e)=>{ e.stopPropagation(); moveCat(pk, cat, 1, presentCats); });
      catChevs.appendChild(cu); catChevs.appendChild(cd);
      left.appendChild(catChevs);
      left.appendChild(el('span','cat-name', cat));
      head.appendChild(left);
      const right = el('div','cat-head-right');
      right.appendChild(el('span','cat-count', doneN+' / '+items.length));
      if (bigEnough){
        const fold = el('span','cat-fold', isCatCol?'\u25B8':'\u25BE');
        fold.addEventListener('click',(e)=>{ e.stopPropagation(); toggleCatCollapse(pk, cat); });
        right.appendChild(fold);
      }
      head.appendChild(right);
      card.appendChild(head);

      if (!isCatCol){
        sortForDisplay(items).forEach(item => {
          card.appendChild(makeRow(item, { showStar:true, showMenu:true, reorder: !item.done }));
          item.subitems.forEach(s => card.appendChild(makeRow(s, {isSub:true, showMenu:true, parent:item})));
        });
        card.appendChild(makeAddRow('Add to '+cat+'...', (val)=>{ data.overall.push(mk(val, pk, cat)); save(); renderAll(); }));
      }
      v.appendChild(card);
    });
  });
}

/* ---------- SOCIAL ---------- */
function renderSocial(){
  const v = document.getElementById('view-social'); v.innerHTML = '';
  v.appendChild(el('div','date-line','Social'));
  v.appendChild(el('div','date-sub','People & Plans! Low priority, no pressure.'));
  PHASES.forEach(([pk,label,cls]) => {
    const items = data.social.filter(t => t.phase===pk);
    if (items.length===0) return;
    const { tag, isCol } = phaseHeader('social-'+pk, label, cls);
    v.appendChild(tag);
    if (isCol) return;
    const card = el('div','card'); card.dataset.phase = pk;
    sortForDisplay(items).forEach(item => {
      card.appendChild(makeRow(item, { showStar:true, showMenu:true, reorder: !item.done }));
      item.subitems.forEach(s => card.appendChild(makeRow(s, {isSub:true, showMenu:true, parent:item})));
    });
    card.appendChild(makeAddRow('Add to '+label+'...', (val)=>{ data.social.push(mk(val, pk, null)); save(); renderAll(); }));
    v.appendChild(card);
  });
}

function renderAll(){
  const st = document.getElementById('screen').scrollTop;
  closeMenu();
  renderToday(); renderOverall(); renderSocial();
  document.getElementById('screen').scrollTop = st;
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('show'));
    tab.classList.add('active');
    document.getElementById('view-'+tab.dataset.tab).classList.add('show');
    document.getElementById('screen').scrollTop = 0;
  });
});

document.getElementById('screen').addEventListener('click', (e)=>{
  if (!e.target.closest('.menu') && !e.target.closest('.dots')) closeMenu();
});

/* ---------- Export / Import ---------- */
const modalBg = document.getElementById('modalBg');
function openModal(mode){
  const title = document.getElementById('modalTitle');
  const desc = document.getElementById('modalDesc');
  const ta = document.getElementById('modalText');
  const actions = document.getElementById('modalActions');
  actions.innerHTML = '';
  if (mode==='export'){
    title.textContent = 'Export data';
    desc.textContent = 'This is your whole list as text. Copy all of it and paste it to Claude when you want a big set of changes made.';
    ta.value = JSON.stringify(data); ta.readOnly = true;
    const copy = el('button','btn-primary','Copy');
    copy.addEventListener('click', () => { ta.select(); document.execCommand('copy'); copy.textContent='Copied'; setTimeout(()=>copy.textContent='Copy',1200); });
    const close = el('button','btn-ghost','Close'); close.addEventListener('click', closeModal);
    actions.appendChild(copy); actions.appendChild(close);
  } else {
    title.textContent = 'Import data';
    desc.textContent = 'Paste the updated text from Claude here. This replaces your current list completely, so only import text that already has everything in it.';
    ta.value = ''; ta.readOnly = false;
    const load2 = el('button','btn-primary','Replace my list');
    load2.addEventListener('click', () => {
      let parsed;
      try { parsed = JSON.parse(ta.value.trim()); } catch(e){ alert('That doesn\u2019t look like valid list text. Check you copied all of it.'); return; }
      if (!parsed || !parsed.overall){ alert('That text is missing the list data.'); return; }
      if (confirm('This will replace your current list completely. Continue?')){ data = parsed; save(); closeModal(); renderAll(); }
    });
    const close = el('button','btn-ghost','Cancel'); close.addEventListener('click', closeModal);
    actions.appendChild(load2); actions.appendChild(close);
  }
  modalBg.classList.add('show');
}
function closeModal(){ modalBg.classList.remove('show'); }
modalBg.addEventListener('click', e => { if(e.target===modalBg) closeModal(); });

load();
</script>
